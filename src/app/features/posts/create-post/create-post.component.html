<app-card className="mb-8 border-blue-500/30">
  <form [formGroup]="postForm" (ngSubmit)="onSubmit()">
    <div class="flex flex-row items-start mb-4">
      <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center mr-3 text-blue-500 font-bold border border-slate-700">
        {{ authService.user()?.login?.substring(0, 2)?.toUpperCase() }}
      </div>
      <div class="flex-1">
        <textarea
          formControlName="text"
          placeholder="What's happening? #alldare"
          class="w-full bg-transparent text-white text-xl placeholder-slate-500 focus:outline-none resize-none py-2"
          rows="3"
        ></textarea>
      </div>
    </div>

    @if (error()) {
      <p class="text-red-500 mb-4 text-sm">{{ error() }}</p>
    }

    <div class="flex flex-row justify-between items-center pt-4 border-t border-slate-800">
      <div class="flex flex-row gap-4">
        <!-- Media icons could go here -->
        <button type="button" class="text-blue-500 hover:text-blue-400 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
        </button>
      </div>

      <app-button
        type="submit"
        title="Post"
        [loading]="isLoading()"
        [disabled]="postForm.invalid"
        className="px-8 py-2 h-10 rounded-full text-sm"
      ></app-button>
    </div>
  </form>
</app-card>
