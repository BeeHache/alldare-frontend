<app-card className="create-post-container mb-8">
  <form [formGroup]="postForm" (ngSubmit)="onSubmit()">
    <div class="flex flex-row items-start mb-4">
      <div class="user-avatar-small mr-3">
        {{ authService.user()?.login?.substring(0, 2)?.toUpperCase() }}
      </div>
      <div class="flex-1">
        <textarea
          formControlName="text"
          placeholder="What's happening? #alldare"
          class="post-textarea"
          rows="3"
        ></textarea>
      </div>
    </div>

    @if (error()) {
      <p class="text-red-500 mb-4 text-sm font-medium bg-red-500/10 p-3 rounded-xl border border-red-500/20">
        {{ error() }}
      </p>
    }

    <div class="post-actions-bar">
      <div class="flex flex-row gap-2">
        <button type="button" class="icon-btn" title="Add Image">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
        </button>
        <button type="button" class="icon-btn" title="Add Video">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
          </svg>
        </button>
      </div>

      <app-button
        type="submit"
        title="Post"
        [loading]="isLoading()"
        [disabled]="postForm.invalid"
        className="submit-btn"
      ></app-button>
    </div>
  </form>
</app-card>
