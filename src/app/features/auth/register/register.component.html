<div class="register-page-wrapper flex items-center justify-center p-4 md:p-8 bg-black min-h-screen">
  <app-card className="w-full max-w-md border-slate-800 shadow-2xl">
    <h1 class="text-3xl md:text-4xl font-black text-white mb-2 tracking-tighter uppercase">Create Account</h1>
    <p class="text-slate-400 mb-8 md:mb-10 text-sm md:text-base font-medium">Join the Alldare creator community</p>

    <app-input
      label="Login"
      [value]="loginValue()"
      (valueChange)="loginValue.set($event)"
      placeholder="Choose a username"
    ></app-input>

    <app-input
      label="Password"
      [value]="passwordValue()"
      (valueChange)="passwordValue.set($event)"
      placeholder="••••••••"
      [secureTextEntry]="true"
    ></app-input>

    <app-input
      label="Confirm Password"
      [value]="confirmPasswordValue()"
      (valueChange)="confirmPasswordValue.set($event)"
      placeholder="Repeat your password"
      [secureTextEntry]="true"
    ></app-input>

    @if (error()) {
      <p class="text-red-500 mb-6 text-center text-sm font-medium bg-red-500/10 p-3 rounded-xl border border-red-500/20">
        {{ error() }}
      </p>
    }

    <app-button
      title="Create Account"
      (onPress)="handleRegister()"
      [loading]="isLoading()"
      className="mt-2 w-full shadow-lg h-12"
    ></app-button>

    <div class="mt-8 md:mt-10 text-center border-t border-slate-800 pt-8">
      <p class="text-slate-500 text-sm font-medium">
        Already have an account?
        <a routerLink="/auth/login" class="text-blue-500 font-bold ml-1 hover:underline transition-all">
          Sign In
        </a>
      </p>
    </div>
  </app-card>
</div>
