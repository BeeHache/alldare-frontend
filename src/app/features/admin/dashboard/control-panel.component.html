<div class="control-panel-layout flex min-h-screen bg-black">
  <!-- Sidebar -->
  <aside class="w-64 border-r border-slate-800 flex flex-col">
    <div class="p-6 border-b border-slate-800">
      <h1 class="text-xl font-black text-white tracking-tighter uppercase">Staff Panel</h1>
    </div>
    
    <nav class="flex-1 p-4 space-y-2">
      <a 
        routerLink="users" 
        routerLinkActive="bg-blue-600/10 text-blue-500 border-blue-600/30"
        class="flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white transition-all border border-transparent"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        <span class="font-bold text-sm">User Management</span>
      </a>
    </nav>

    <div class="p-4 border-t border-slate-800">
      <button 
        (click)="logout()"
        class="w-full flex items-center gap-3 p-3 rounded-xl text-red-400 hover:bg-red-500/10 transition-all"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        <span class="font-bold text-sm">Logout</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 overflow-auto">
    <div class="p-8">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
