<div class="admin-overview">
  <h2 class="text-3xl font-black text-white tracking-tight uppercase mb-2">Admin Dashboard</h2>
  <p class="text-slate-400 font-medium mb-8">Platform overview and quick actions</p>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <!-- Stat Card: Users -->
    <app-card [className]="'border-slate-800 bg-blue-600/5'">
      <div class="flex items-center justify-between mb-4">
        <span class="text-slate-500 font-black uppercase text-xs tracking-widest">Active Users</span>
        <div class="p-2 bg-blue-600/10 rounded-lg text-blue-500">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
          </svg>
        </div>
      </div>
      <div class="text-4xl font-black text-white mb-1">--</div>
      <p class="text-xs text-slate-500">Live platform count</p>
    </app-card>

    <!-- Stat Card: Posts -->
    <app-card [className]="'border-slate-800 bg-purple-600/5'">
      <div class="flex items-center justify-between mb-4">
        <span class="text-slate-500 font-black uppercase text-xs tracking-widest">Total Posts</span>
        <div class="p-2 bg-purple-600/10 rounded-lg text-purple-500">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10l4 4v10a2 2 0 01-2 2z" />
          </svg>
        </div>
      </div>
      <div class="text-4xl font-black text-white mb-1">--</div>
      <p class="text-xs text-slate-500">Combined media content</p>
    </app-card>

    <!-- Stat Card: System -->
    <app-card [className]="'border-slate-800 bg-green-600/5'">
      <div class="flex items-center justify-between mb-4">
        <span class="text-slate-500 font-black uppercase text-xs tracking-widest">System Status</span>
        <div class="p-2 bg-green-600/10 rounded-lg text-green-500 animate-pulse">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </div>
      </div>
      <div class="text-2xl font-black text-white mb-1 uppercase tracking-tighter">Healthy</div>
      <p class="text-xs text-slate-500">All microservices operational</p>
    </app-card>
  </div>

  <div class="mt-8">
    <app-card [className]="'border-slate-800'">
      <h3 class="text-white font-bold mb-4">Quick Links</h3>
      <div class="flex gap-4">
        <a routerLink="users">
          <app-button title="Manage Users" variant="outline" className="h-10 px-4 text-xs w-auto"></app-button>
        </a>
      </div>
    </app-card>
  </div>
</div>
