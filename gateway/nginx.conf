worker_processes auto;

# Environment variables
env JWKS_URL;
env AUTH_SERVICE_URL;
env POSTS_SERVICE_URL;
env MEDIA_SERVICE_URL;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Shared memory for caching JWKS
    lua_shared_dict jwks_cache 1m;

    # Lua configuration
    # Include OPM paths and local paths
    lua_package_path "/usr/local/openresty/site/lualib/?.lua;/usr/local/openresty/lualib/?.lua;/usr/local/openresty/nginx/lua/?.lua;;";
    lua_package_cpath "/usr/local/openresty/site/lualib/?.so;/usr/local/openresty/lualib/?.so;;";
    
    # Load all configurations from conf.d
    include /etc/nginx/conf.d/*.conf;
}
