server {
    listen 80;
    server_name _;

    # Health check (must be before redirection)
    location /health {
        access_log off;
        content_by_lua_block {
            ngx.say("OK")
            ngx.say("JWKS_URL: " .. (os.getenv("JWKS_URL") or "NOT SET"))
        }
    }

    # Handle OPTIONS and redirects for port 80
    location / {
        header_filter_by_lua_block {
            ngx.header["Access-Control-Allow-Origin"] = "*"
            ngx.header["Access-Control-Allow-Methods"] = "GET, POST, PUT, DELETE, OPTIONS, PATCH"
            ngx.header["Access-Control-Allow-Headers"] = "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-User-Id"
        }
        if ($request_method = 'OPTIONS') {
            content_by_lua_block {
                ngx.header["Access-Control-Max-Age"] = 1728000
                ngx.header["Content-Type"] = "text/plain; charset=utf-8"
                ngx.header["Content-Length"] = 0
                ngx.exit(204)
            }
        }
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name _;

    # DNS resolver for runtime resolution of upstreams
    resolver 127.0.0.11 valid=30s;

    # Global CORS configuration logic
    set_by_lua_block $cors_origin {
        local origin = ngx.var.http_origin
        if origin and (origin:find("^https?://localhost") or origin:find("^https?://127.0.0.1")) then
            return origin
        end
        return "*"
    }

    header_filter_by_lua_block {
        ngx.header["Access-Control-Allow-Origin"] = ngx.var.cors_origin
        ngx.header["Access-Control-Allow-Methods"] = "GET, POST, PUT, DELETE, OPTIONS, PATCH"
        ngx.header["Access-Control-Allow-Headers"] = "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-User-Id"
        ngx.header["Access-Control-Allow-Credentials"] = "true"
        ngx.header["Access-Control-Expose-Headers"] = "Content-Length,Content-Range"
    }

    # Handle Preflight requests
    location = /api-preflight {
        internal;
        content_by_lua_block {
            ngx.header["Access-Control-Max-Age"] = 1728000
            ngx.header["Content-Type"] = "text/plain; charset=utf-8"
            ngx.header["Content-Length"] = 0
            ngx.exit(204)
        }
    }

    # Placeholder SSL configuration
    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # Use variables for upstreams to prevent startup crash if host is missing
    set_by_lua $auth_url 'return os.getenv("AUTH_SERVICE_URL") or "http://alldare-auth:9000"';
    set_by_lua $posts_url 'return os.getenv("POSTS_SERVICE_URL") or "http://alldare-posts:8080"';
    set_by_lua $media_url 'return os.getenv("MEDIA_SERVICE_URL") or "http://alldare-media:8081"';
    set_by_lua $feeds_url 'return os.getenv("FEEDS_SERVICE_URL") or "http://alldare-feeds:8082"';

    # Static Web UI Serving
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Public Endpoints (No JWT Verification)
    location /api/v1/auth/ {
        if ($request_method = 'OPTIONS') {
            rewrite ^ /api-preflight last;
        }
        proxy_pass $auth_url$request_uri;
    }

    location /oauth2/ {
        if ($request_method = 'OPTIONS') {
            rewrite ^ /api-preflight last;
        }
        proxy_pass $auth_url$request_uri;
    }

    location /login/ {
        if ($request_method = 'OPTIONS') {
            rewrite ^ /api-preflight last;
        }
        proxy_pass $auth_url$request_uri;
    }

    # Protected Endpoints
    location /api/v1/posts/ {
        if ($request_method = 'OPTIONS') {
            rewrite ^ /api-preflight last;
        }
        access_by_lua_file /usr/local/openresty/nginx/lua/verify_jwt.lua;
        proxy_pass $posts_url$request_uri;
    }

    location /api/v1/storage/ {
        if ($request_method = 'OPTIONS') {
            rewrite ^ /api-preflight last;
        }
        access_by_lua_file /usr/local/openresty/nginx/lua/verify_jwt.lua;
        proxy_pass $media_url$request_uri;
    }

    location /api/v1/feeds/ {
        if ($request_method = 'OPTIONS') {
            rewrite ^ /api-preflight last;
        }
        access_by_lua_file /usr/local/openresty/nginx/lua/verify_jwt.lua;
        proxy_pass $feeds_url$request_uri;
    }

    location /api/v1/subscriptions/ {
        if ($request_method = 'OPTIONS') {
            rewrite ^ /api-preflight last;
        }
        access_by_lua_file /usr/local/openresty/nginx/lua/verify_jwt.lua;
        proxy_pass $feeds_url$request_uri;
    }

    location /api/v1/admin/ {
        if ($request_method = 'OPTIONS') {
            rewrite ^ /api-preflight last;
        }
        # access_by_lua_file /usr/local/openresty/nginx/lua/verify_jwt.lua;
        proxy_pass $auth_url$request_uri;
    }
}
